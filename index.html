<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSTiers | Global Leaderboard</title>
    <style>
        /* [Keeping your sick CSS from before] */
        :root { --bg: #050505; --card: #121212; --accent: #00f2ff; --ht1: #ffae00; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 1000px; width: 100%; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; }
        .player-list { display: grid; gap: 10px; }
        .player-row { background: var(--card); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 4px solid #333; transition: 0.2s; }
        .tier-ht1 { border-left-color: var(--ht1); box-shadow: inset 50px 0 50px -50px rgba(255, 174, 0, 0.2); }
        .rank-num { font-weight: bold; color: var(--accent); margin-right: 10px; width: 30px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DSTiers Top 1000</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="Search for a player...">
        
        <div id="playerList" class="player-list">
            </div>
    </div>

    <script>
        // FOR TOP 1000: We store data in a separate variable.
        // To hide this, you can move this array to a file called 'data.js' 
        // and link it with <script src="data.js"><\/script>
        const dstData = [
            { n: "Roy", t: "HT1", s: "GM", p: "PC/Mob" },
            { n: "Shadow", t: "HT2", s: "T2", p: "PC" },
            // ... add up to 1000 here
        ];

        const listDiv = document.getElementById('playerList');
        const searchInput = document.getElementById('searchInput');

        function updateDisplay(filter = "") {
            listDiv.innerHTML = dstData
                .filter(p => p.n.toLowerCase().includes(filter.toLowerCase()))
                .map((p, i) => `
                    <div class="player-row ${p.t.toLowerCase() === 'ht1' ? 'tier-ht1' : ''}">
                        <div>
                            <span class="rank-num">#${i + 1}</span>
                            <strong>${p.n}</strong> <small style="color:#666; margin-left:10px;">${p.p}</small>
                        </div>
                        <div style="color: ${p.t === 'HT1' ? 'var(--ht1)' : '#fff'}">
                            ${p.t} | Shotgun: ${p.s}
                        </div>
                    </div>
                `).join('');
        }

        searchInput.oninput = (e) => updateDisplay(e.target.value);
        updateDisplay(); // Initial load
    </script>
</body>
</html>
