<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSTiers | Pro Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #eab308; --bg: #030303; }
        body { background-color: var(--bg); color: #eee; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Interactive Filter Buttons */
        .filter-btn { transition: 0.15s; color: #888; font-weight: 700; font-size: 11px; padding: 4px 12px; border-radius: 6px; }
        .filter-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .filter-btn.active { background: #1a1a1a; color: white; font-weight: 900; }
        
        /* Pro Table Styling */
        table { border-collapse: separate; border-spacing: 0; }
        thead tr th { background: #0c0c0c; border-bottom: 2px solid #1a1a1a; padding: 12px 16px; font-weight: 900; color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        tbody tr td { padding: 12px 16px; border-bottom: 1px solid #121212; transition: 0.1s; }
        tbody tr:hover td { background: rgba(255,255,255,0.015); border-bottom-color: #222; }
        
        /* The Advanced Tier Badges (Dynamic colors) */
        .t-badge { font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; box-shadow: inset 0 0 1px 1px rgba(255,255,255,0.05); }
        
        /* Platform/Mode Badges */
        .p-badge { background: #141414; color: #aaa; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; }
        .m-badge { background: rgba(0,0,0,0.5); color: #888; border: 1px solid #1a1a1a; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }

    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-zinc-900 bg-black/95 sticky top-0 z-50 px-8 py-3 flex justify-between items-center backdrop-blur-sm">
        <div class="flex items-center gap-1">
            <h1 class="text-xl font-black italic tracking-tighter text-yellow-500">DS<span class="text-white">TIERS</span></h1>
            <span class="p-badge text-[9px] bg-yellow-500 text-black">BETA</span>
        </div>
        <div class="flex gap-4 items-center">
            <span class="filter-btn active">DATABASE</span>
            <span class="filter-btn">TIER LIST</span>
            <a href="https://discord.gg/2MEP67Rbj2" target="_blank" class="bg-[#5865F2] hover:bg-[#4752C4] text-white text-[11px] font-black px-4 py-1.5 rounded-md transition-all shadow-[0_2px_10px_rgba(88,101,242,0.3)]">DISCORD</a>
        </div>
    </nav>

    <main class="container mx-auto p-6 md:p-10 space-y-8 max-w-7xl">
        
        <div class="bg-zinc-950 p-6 rounded-2xl border border-zinc-900 shadow-xl space-y-5">
            <h2 class="text-3xl font-black italic">PRO DATABASE</h2>
            <p class="text-zinc-500 text-sm tracking-widest uppercase">Max Power rankings from L1 through H5</p>
            
            <input type="text" id="searchInput" placeholder="Search players by name, tag, or mode..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-3.5 text-sm focus:outline-none focus:border-yellow-500 transition-all placeholder:text-zinc-700">

            <div class="flex flex-wrap gap-4 text-xs font-bold items-center text-zinc-600">
                <span class="uppercase tracking-widest">Platform:</span>
                <span id="pALL" class="filter-btn active" onclick="setPlatFilter('ALL')">ALL</span>
                <span id="pMobile" class="filter-btn" onclick="setPlatFilter('Mobile')">Mobile</span>
                <span id="pPC" class="filter-btn" onclick="setPlatFilter('PC')">PC</span>
            </div>
            <div class="flex flex-wrap gap-4 text-xs font-bold items-center text-zinc-600">
                <span class="uppercase tracking-widest">Mode:</span>
                <span id="mALL" class="filter-btn active" onclick="setModeFilter('ALL')">ALL</span>
                <span id="mFFA" class="filter-btn" onclick="setModeFilter('FFA')">FFA</span>
                <span id="mTDM" class="filter-btn" onclick="setModeFilter('TDM')">TDM</span>
                <span id="mPoint" class="filter-btn" onclick="setModeFilter('Point')">Point</span>
                <span id="mConfirm" class="filter-btn" onclick="setModeFilter('Confirm')">Confirm</span>
                <span id="mTeam KC" class="filter-btn" onclick="setModeFilter('Team KC')">Team KC</span>
                <span id="mDom" class="filter-btn" onclick="setModeFilter('Dom')">Dom</span>
            </div>
        </div>

        <div class="bg-zinc-950 border border-zinc-900 rounded-xl shadow-inner overflow-x-auto">
            <table class="w-full min-w-[1000px]">
                <thead>
                    <tr>
                        <th class="w-16">#</th>
                        <th>Player</th>
                        <th>Platform</th>
                        <th>Mode</th>
                        <th>Overall</th>
                        <th class="text-center">AR</th>
                        <th class="text-center">SMG</th>
                        <th class="text-center">Sniper</th>
                        <th class="text-center">Shotgun</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
            <div class="p-4 text-center text-xs text-zinc-600 border-t border-zinc-900" id="rowCount">Showing 0 of 0 players</div>
        </div>
    </main>

    <script>
        // Data Structure matching your types.ts
        const players = [
            { id: 1, name: 'Royies', tag: '[SIC]', plat: 'PC', altPlat: 'Mobile', mode: 'TDM', ovr: 'H4', weapons: { ar: 'H2', smg: 'L2', snp: 'H4', shg: 'L1' } },
            { id: 2, name: 'Hrisa', tag: '', plat: 'PC', altPlat: null, mode: 'TDM', ovr: 'L2', weapons: { ar: 'L2', smg: null, snp: null, shg: null } },
            // Add more players here!
        ];

        // Tier Color Configuration (Matching your image_0.png complexity)
        const tierColors = {
            'L1': 'bg-blue-900 text-white', 'H1': 'bg-blue-500 text-white',
            'L2': 'bg-purple-800 text-white', 'H2': 'bg-purple-600 text-white',
            'L3': 'bg-red-800 text-white', 'H3': 'bg-red-600 text-white',
            'L4': 'bg-orange-800 text-white', 'H4': 'bg-orange-500 text-black',
            'L5': 'bg-yellow-800 text-white', 'H5': 'bg-yellow-500 text-black'
        };

        let activePlat = 'ALL';
        let activeMode = 'ALL';
        let searchTerm = '';

        function setPlatFilter(plat) { activePlat = plat; updateFilterUI('platform', plat); filterData(); }
        function setModeFilter(mode) { activeMode = mode; updateFilterUI('mode', mode); filterData(); }
        document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); filterData(); });

        function updateFilterUI(type, activeValue) {
            const prefix = type === 'platform' ? 'p' : 'm';
            document.querySelectorAll(`.${type}-filter .filter-btn`).forEach(b => b.classList.remove('active'));
            document.getElementById(`${prefix}${activeValue}`).classList.add('active');
        }

        function filterData() {
            const filtered = players.filter(p => {
                const searchMatch = p.name.toLowerCase().includes(searchTerm) || p.tag.toLowerCase().includes(searchTerm) || p.mode.toLowerCase().includes(searchTerm);
                const platMatch = activePlat === 'ALL' || p.plat === activePlat || p.altPlat === activePlat;
                const modeMatch = activeMode === 'ALL' || p.mode === activeMode;
                return searchMatch && platMatch && modeMatch;
            });
            renderTable(filtered);
        }

        // Advanced rendering of complex rows
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((p, idx) => `
                <tr class="pro-row">
                    <td class="text-zinc-700 text-xs font-black">${idx + 1}</td>
                    <td>
                        <div class="font-bold text-sm">${p.name} <span class="text-zinc-600 font-normal ml-1">${p.tag}</span></div>
                    </td>
                    <td>
                        <div class="flex flex-col gap-1 items-start">
                            <span class="p-badge">${p.plat}</span>
                            ${p.altPlat ? `<span class="p-badge text-zinc-600">${p.altPlat}</span>` : ''}
                        </div>
                    </td>
                    <td><span class="m-badge">${p.mode}</span></td>
                    <td><span class="t-badge ${tierColors[p.ovr]}">${p.ovr}</span></td>
                    ${['ar', 'smg', 'snp', 'shg'].map(w => {
                        const val = p.weapons[w];
                        return `<td class="text-center">${val ? `<span class="t-badge text-[9px] ${tierColors[val]}">${val}</span>` : '<span class="text-zinc-800">—</span>'}</td>`;
                    }).join('')}
                </tr>
            `).join('');
            document.getElementById('rowCount').innerText = `Showing ${data.length} of ${players.length} players`;
        }

        // Initial Load
        renderTable(players);
    </script>
</body>
</html>
