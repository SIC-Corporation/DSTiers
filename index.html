<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSTiers | Official Rankings</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #00f2ff;
            --ht1: #ffae00;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        /* The Smooth Fade-In Animation */
        @keyframes fadeInUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .container {
            max-width: 900px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }

        .player-card {
            background: var(--card);
            border-radius: 12px;
            padding: 25px;
            border-left: 5px solid var(--ht1); /* The HT1 Rank Color */
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 174, 0, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .ht1-text { color: var(--ht1); font-weight: bold; }
        .low-tier { color: #888; } /* For the Sniper rank! */

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>DSTiers</h1>
            <p>The Official Deadshot Tier List — Max Power Only.</p>
        </header>

        <div class="player-card">
            <div>
                <h2 style="margin:0;">YOUR_NAME <span class="badge">HT1</span></h2>
                <div class="stats">
                    <span>🔥 Shotgun: <span class="ht1-text">GRANDMASTER</span></span>
                    <span>🔫 SMG: <span class="ht1-text">T1</span></span>
                    <span>🔫 Rifle: <span class="ht1-text">T2</span></span>
                    <span>🎯 Sniper: <span class="low-tier">T5 (W.I.P)</span></span>
                </div>
            </div>
            <div style="text-align:right;">
                <span class="badge" style="color:var(--accent)">PLATFORM: PC / MOBILE</span>
            </div>
        </div>
    </div>

</body>
</html>
