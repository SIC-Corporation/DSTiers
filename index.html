<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSTiers | Official Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .tier-card { transition: 0.3s; border-left: 4px solid transparent; }
        .tier-card:hover { transform: translateX(5px); background: #161616; }
        .H1 { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .L1 { border-color: #1e40af; background: rgba(30, 64, 175, 0.1); }
        .H4 { border-color: #fb923c; background: rgba(251, 146, 60, 0.1); }
    </style>
</head>
<body class="p-8">
    <nav class="flex justify-between items-center mb-12 border-b border-zinc-800 pb-4">
        <h1 class="text-2xl font-black italic text-yellow-500">DS<span class="text-white">TIERS</span></h1>
        <a href="https://discord.gg/2MEP67Rbj2" class="bg-[#5865F2] px-4 py-2 rounded font-bold text-sm">DISCORD</a>
    </nav>

    <div id="player-list" class="max-w-4xl mx-auto space-y-4">
        </div>

    <script>
        const players = [
            { name: 'Royies', tag: '[SIC]', platform: 'PC/Mobile', overall: 'H4', weapons: { s: 'L1', ar: 'H2', sn: 'H4' } },
            { name: 'Hrisa', tag: '', platform: 'PC', overall: 'L2', weapons: { s: '—', ar: 'L2', sn: '—' } }
        ];

        const list = document.getElementById('player-list');
        players.forEach(p => {
            list.innerHTML += `
                <div class="tier-card ${p.overall} p-6 rounded-lg flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-bold">${p.name} <span class="text-zinc-500 text-sm">${p.tag}</span></h2>
                        <p class="text-xs text-zinc-400 uppercase tracking-widest">${p.platform}</p>
                    </div>
                    <div class="flex gap-4 text-center">
                        <div><p class="text-[10px] text-zinc-500">SHOTGUN</p><p class="font-bold">${p.weapons.s}</p></div>
                        <div><p class="text-[10px] text-zinc-500">SNIPER</p><p class="font-bold">${p.weapons.sn}</p></div>
                        <div class="bg-black/40 px-4 py-1 rounded border border-white/10">
                            <p class="text-[10px] text-zinc-500">OVERALL</p><p class="font-bold text-yellow-500">${p.overall}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
