<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSTiers | Elite Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #eab308; --bg: #030303; }
        body { background-color: var(--bg); color: #eee; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- COOL ANIMATIONS --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(234, 179, 8, 0.2); }
            50% { box-shadow: 0 0 20px rgba(234, 179, 8, 0.5); }
            100% { box-shadow: 0 0 5px rgba(234, 179, 8, 0.2); }
        }

        .anim-fade-up { animation: fadeInUp 0.6s ease-out forwards; }
        .anim-slide-left { animation: slideInLeft 0.5s ease-out forwards; }
        
        /* Staggered Row Animation */
        .pro-row { opacity: 0; animation: fadeInUp 0.5s ease-out forwards; }
        .pro-row:nth-child(1) { animation-delay: 0.1s; }
        .pro-row:nth-child(2) { animation-delay: 0.2s; }

        /* --- UI STYLING --- */
        .filter-btn { transition: 0.2s; color: #666; font-size: 11px; padding: 6px 14px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .filter-btn:hover { color: white; background: #111; }
        .filter-btn.active { background: #1a1a1a; color: #eab308; border-color: #eab308; font-weight: 900; }

        table { border-spacing: 0 8px; border-collapse: separate; }
        tbody tr td { background: #0a0a0a; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        tbody tr td:first-child { border-left: 1px solid #1a1a1a; border-radius: 12px 0 0 12px; }
        tbody tr td:last-child { border-right: 1px solid #1a1a1a; border-radius: 0 12px 12px 0; }
        tbody tr:hover td { background: #111; border-color: #333; transform: scale(1.005); }

        .t-badge { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; }
        .L1-glow { animation: glowPulse 2s infinite; border: 1px solid #3b82f6; }

        /* Tier Colors */
        .bg-L1 { background: #1e40af; color: white; }
        .bg-H1 { background: #3b82f6; color: white; }
        .bg-H2 { background: #9333ea; color: white; }
        .bg-L2 { background: #6b21a8; color: white; }
        .bg-H4 { background: #f97316; color: white; }
        .bg-L5 { background: #ca8a04; color: white; }
        .bg-H5 { background: #eab308; color: black; }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-12 anim-fade-up">
        <div class="flex items-center gap-2">
            <h1 class="text-3xl font-black italic tracking-tighter text-yellow-500">DS<span class="text-white">TIERS</span></h1>
            <span class="text-[10px] bg-zinc-800 px-2 py-0.5 rounded font-bold text-zinc-500">DATABASE v1.0</span>
        </div>
        <div class="flex gap-4">
            <a href="https://discord.gg/2MEP67Rbj2" target="_blank" class="bg-[#5865F2] hover:scale-105 px-6 py-2 rounded-xl font-black text-xs transition-all shadow-lg shadow-blue-900/20">DISCORD</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto">
        <div class="mb-10 space-y-6 anim-slide-left">
            <h2 class="text-5xl font-black italic tracking-tight uppercase">Ranked Registry</h2>
            
            <div class="bg-zinc-900/30 p-4 rounded-2xl border border-zinc-800 flex flex-wrap gap-6 items-center">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black text-zinc-500 uppercase">Platform</span>
                    <div class="flex bg-black p-1 rounded-lg">
                        <span class="filter-btn active" id="pALL" onclick="setPlat('ALL')">ALL</span>
                        <span class="filter-btn" id="pPC" onclick="setPlat('PC')">PC</span>
                        <span class="filter-btn" id="pMobile" onclick="setPlat('Mobile')">MOBILE</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-zinc-600 text-[10px] font-black uppercase tracking-widest">
                        <th class="p-4">#</th>
                        <th class="p-4">Player Profile</th>
                        <th class="p-4">Main / Alt</th>
                        <th class="p-4">Current OVR</th>
                        <th class="p-4 text-center">AR</th>
                        <th class="p-4 text-center">SMG</th>
                        <th class="p-4 text-center">SNIPER</th>
                        <th class="p-4 text-center">SHOTGUN</th>
                        <th class="p-4">Combat Notes</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const players = [
            { 
                name: 'Royies', 
                tag: '[SIC]', 
                plat: 'PC', 
                alt: 'Mobile', 
                ovr: 'H4', 
                weapons: { ar: 'H2', smg: 'L2', snp: 'H4', shg: 'L1' },
                notes: 'Best: TDM/KC. Worst: FFA. Good: Dom/Point. Weak: Confirm.' 
            },
            { 
                name: 'Hrisa', 
                tag: '', 
                plat: 'PC', 
                alt: null, 
                ovr: 'L2', 
                weapons: { ar: 'L2', smg: null, snp: null, shg: null },
                notes: 'Standard AR player. Prefers TDM.' 
            }
        ];

        const tierColors = {
            'L1': 'bg-L1 L1-glow', 'H1': 'bg-H1', 'H2': 'bg-H2', 'L2': 'bg-L2',
            'H4': 'bg-H4', 'L5': 'bg-L5', 'H5': 'bg-H5'
        };

        let currentPlat = 'ALL';

        function setPlat(p) {
            currentPlat = p;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('p' + p).classList.add('active');
            render();
        }

        function render() {
            const body = document.getElementById('tableBody');
            const filtered = players.filter(p => currentPlat === 'ALL' || p.plat === currentPlat || p.alt === currentPlat);
            
            body.innerHTML = filtered.map((p, i) => `
                <tr class="pro-row">
                    <td class="p-4 text-zinc-700 font-black text-xs">${i + 1}</td>
                    <td class="p-4">
                        <div class="font-black text-sm">${p.name} <span class="text-zinc-600 font-normal ml-1">${p.tag}</span></div>
                    </td>
                    <td class="p-4">
                        <span class="text-[9px] bg-zinc-900 px-2 py-1 rounded text-zinc-400 font-bold border border-zinc-800">${p.plat}${p.alt ? '/' + p.alt : ''}</span>
                    </td>
                    <td class="p-4">
                        <span class="t-badge ${tierColors[p.ovr]}">${p.ovr}</span>
                    </td>
                    ${['ar', 'smg', 'snp', 'shg'].map(w => {
                        const v = p.weapons[w];
                        return `<td class="p-4 text-center">${v ? `<span class="t-badge ${tierColors[v]}">${v}</span>` : '<span class="text-zinc-800">—</span>'}</td>`;
                    }).join('')}
                    <td class="p-4">
                        <p class="text-[10px] text-zinc-500 italic max-w-[200px] leading-tight">${p.notes}</p>
                    </td>
                </tr>
            `).join('');
        }

        render();
    </script>
</body>
</html>
