<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSTiers | Official Rankings</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #00f2ff;
            --ht1: #ffae00; /* Gold for Elite */
            --ht2: #e1e1e1; /* Silver for High Tier */
            --low-tier: #555;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }

        /* Player List Styling */
        #player-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .player-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* Side rank indicator */
        .player-card.tier-ht1 { border-left: 6px solid var(--ht1); }
        .player-card.tier-ht2 { border-left: 6px solid var(--ht2); }

        .player-card:hover {
            transform: translateY(-5px) scale(1.01);
            background: #1a1a1a;
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .weapon-stat {
            font-size: 0.9rem;
            color: #aaa;
        }

        .val-ht1 { color: var(--ht1); font-weight: bold; }
        .val-wip { color: var(--low-tier); text-decoration: line-through; }

        .badge {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .discord-btn {
            margin-top: 50px;
            padding: 15px 30px;
            background: #5865F2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .discord-btn:hover {
            background: #4752c4;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>DSTiers</h1>
            <p style="color: var(--accent); letter-spacing: 2px;">DEADSHOT TIER LIST • MAX POWER</p>
        </header>

        <div id="player-list">
            </div>

        <div style="text-align: center;">
            <a href="https://discord.com/invite/Q6UypwueRR" class="discord-btn">JOIN THE DISCORD ARENA</a>
        </div>
    </div>

    <script>
        // THE DSTiers DATABASE
        // Just add or remove players here!
        const players = [
            {
                name: "ROY", 
                overallTier: "HT1",
                platform: "PC / MOBILE",
                stats: {
                    shotgun: "GRANDMASTER",
                    smg: "T1",
                    rifle: "T2",
                    sniper: "T5 (W.I.P)"
                }
            },
            {
                name: "COUNCIL_MEMBER_1",
                overallTier: "HT2",
                platform: "PC",
                stats: {
                    shotgun: "T2",
                    smg: "T2",
                    rifle: "T1",
                    sniper: "T2"
                }
            }
        ];

        const listContainer = document.getElementById('player-list');

        function renderTiers() {
            listContainer.innerHTML = players.map(player => `
                <div class="player-card tier-${player.overallTier.toLowerCase()}">
                    <div>
                        <h2 style="margin:0;">${player.name} <span class="badge">${player.overallTier}</span></h2>
                        <div class="stats">
                            <span class="weapon-stat">🔥 Shotgun: <span class="${player.stats.shotgun.includes('W.I.P') ? 'val-wip' : 'val-ht1'}">${player.stats.shotgun}</span></span>
                            <span class="weapon-stat">🔫 SMG: <span class="val-ht1">${player.stats.smg}</span></span>
                            <span class="weapon-stat">🔫 Rifle: <span class="val-ht1">${player.stats.rifle}</span></span>
                            <span class="weapon-stat">🎯 Sniper: <span class="${player.stats.sniper.includes('W.I.P') ? 'val-wip' : 'val-ht1'}">${player.stats.sniper}</span></span>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <span class="badge" style="color:var(--accent)">${player.platform}</span>
                    </div>
                </div>
            `).join('');
        }

        renderTiers();
    </script>
</body>
</html>
